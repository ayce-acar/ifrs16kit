name: CI

on: [push, pull_request]

jobs:
  test:
    name: "Layers 1-5 · Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e .[dev]
      - run: pytest --cov=ifrs16kit --cov-report=term-missing --cov-fail-under=90

  excel-recalc:
    name: "Layer 6 · two-engine (LibreOffice)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y libreoffice-calc
      - run: pip install -e .[dev]
      - run: pytest tests/test_excel_recalc.py -v

  package:
    name: "Build + twine check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
